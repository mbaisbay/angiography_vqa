# =============================================================================
# Run 4 (Optional x-size): YOLO11x-seg — ARCADE Iterative Cross-Training
# =============================================================================

run_name: run4_yolo11x
description: "X-size ablation: YOLO11x-seg (largest YOLO11, smaller batch)"

# === MODEL ===
model: yolo11x-seg.pt

# === PATHS ===
arcade_root: ../arcade/submission
data_dir: ../arcade_experiments/data
results_dir: ../arcade_experiments/results/run4_yolo11x

# === TRAINING ===
imgsz: 512
batch: 8                     # Smaller batch for larger model
epochs: 200
patience: 25
optimizer: AdamW
lr0: 0.001
lrf: 0.01
weight_decay: 0.005
momentum: 0.937
warmup_epochs: 5
freeze: 10
freeze_epochs: 15
seed: 42
deterministic: true
amp: true
cos_lr: true
device: "0"
workers: 4

# === AUGMENTATION ===
mosaic: 0.0
mixup: 0.0
copy_paste: 0.0
fliplr: 0.5
flipud: 0.0
degrees: 20.0
scale: 0.4
translate: 0.1
hsv_h: 0.0
hsv_s: 0.0
hsv_v: 0.3
erasing: 0.0
shear: 0.0
perspective: 0.0

# === PSEUDO-LABELING ===
pseudo_label:
  initial_conf: 0.85
  conf_decay: 0.05
  min_conf: 0.65
  use_one_to_many: false

# === ITERATION ===
iterations: 3
